<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Login - Student Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .form-control {
            border-radius: 10px;
        }
        
        .btn-custom {
            background: white;
            color: #764ba2;
            font-weight: bold;
            border-radius: 10px;
        }
        
        .btn-custom:hover {
            background: #f1f1f1;
        }
        
        a {
            color: #ffd369;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="glass-card text-center">
        <h2 class="mb-4">Student Notes</h2>

        <input type="text" id="loginUsername" class="form-control mb-3" placeholder="Username">

        <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-custom w-100" onclick="loginUser()">Login</button>

        <p class="mt-3">New here? <a href="register.html">Register</a></p>
    </div>

    <script>
        async function loginUser() {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();

            if (!username || !password) {
                alert("Please fill in both fields");
                return;
            }

            try {
                console.log("Attempting login for:", username);
                
                const response = await fetch("http://localhost:8081/users/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        username,
                        password
                    })
                });

                console.log("Response status:", response.status);
                const result = await response.text();
                console.log("Response text:", result);

                if (result === "Login Success") {
                    console.log("Login successful, checking session...");
                    
                    // Verify session was set
                    const sessionCheck = await fetch("http://localhost:8081/users/check-session", {
                        credentials: "include"
                    });
                    const sessionResult = await sessionCheck.text();
                    console.log("Session check result:", sessionResult);
                    
                    // Small delay to ensure session is fully established
                    setTimeout(() => {
                        console.log("Redirecting to index.html");
                        window.location.href = "index.html";
                    }, 100);
                } else {
                    alert(result || "Invalid Credentials");
                }
            } catch (error) {
                console.error("Login error:", error);
                alert("Connection error. Please check if the backend is running.");
            }
        }

        // Allow Enter key to submit
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("loginPassword").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    loginUser();
                }
            });
        });
    </script>

</body>

</html>
