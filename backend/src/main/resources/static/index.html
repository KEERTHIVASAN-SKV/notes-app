<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Student Notes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .note-card {
            border-radius: 15px;
            transition: 0.3s;
            background: white;
        }
        
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        textarea,
        input {
            border-radius: 10px !important;
        }
        
        .btn-edit {
            background: #ffc107;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white">My Notes</h2>
            <button onclick="logout()" class="btn btn-light">Logout</button>
        </div>

        <div class="card p-4 mb-4 shadow">
            <input type="hidden" id="editId">

            <input type="text" id="noteTitle" class="form-control mb-3" placeholder="Note Title">

            <textarea id="noteContent" class="form-control mb-3" rows="3" placeholder="Write something amazing..."></textarea>

            <button class="btn btn-dark w-100" onclick="saveNote()">
            Save Note
        </button>
        </div>

        <div class="row" id="notesContainer"></div>

    </div>

    <!-- Toast Container -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1050">
        <div id="toastMsg" class="toast align-items-center text-white bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">
                    Hello, this is a toast message!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        console.log("Index page loaded");

        async function checkSession() {
            try {
                console.log("Checking session...");
                const response = await fetch("http://localhost:8081/notes", {
                    credentials: "include"
                });

                console.log("Session check response status:", response.status);

                if (!response.ok) {
                    console.log("Session invalid, redirecting to login");
                    window.location.replace("login.html");
                    return false;
                }
                console.log("Session valid");
                return true;
            } catch (error) {
                console.error("Session check error:", error);
                window.location.replace("login.html");
                return false;
            }
        }

        async function loadNotes() {
            try {
                console.log("Loading notes...");
                const response = await fetch("http://localhost:8081/notes", {
                    credentials: "include"
                });

                console.log("Load notes response status:", response.status);

                if (!response.ok) {
                    console.log("Failed to load notes, redirecting to login");
                    window.location.replace("login.html");
                    return;
                }

                const notes = await response.json();
                console.log("Loaded notes:", notes.length);
                const container = document.getElementById("notesContainer");
                container.innerHTML = "";

                notes.forEach(note => {
                    if (!note.deleted) {
                        container.innerHTML += `
                    <div class="col-md-4 mb-3">
                        <div class="card p-3 note-card shadow">
                            <h5>${note.title}</h5>
                            <p>${note.content}</p>

                            <div class="d-flex justify-content-between mt-3">
                                <button class="btn btn-edit btn-sm"
                                    onclick="editNote(${note.id}, '${note.title}', '${note.content}')">
                                    Edit
                                </button>

                                <button class="btn btn-delete btn-sm"
                                    onclick="deleteNote(${note.id})">
                                    Delete
                                </button>
                            </div>

                        </div>
                    </div>
                `;
                    }
                });
            } catch (error) {
                console.error("Error loading notes:", error);
            }
        }

        function showToast(message, type = "primary") {
            const toastEl = document.getElementById("toastMsg");
            const toastBody = document.getElementById("toastBody");

            toastEl.className = `toast align-items-center text-white bg-${type} border-0`;
            toastBody.textContent = message;

            const toast = new bootstrap.Toast(toastEl, {
                delay: 3000
            });
            toast.show();
        }

        async function saveNote() {
            const id = document.getElementById("editId").value;
            const title = document.getElementById("noteTitle").value.trim();
            const content = document.getElementById("noteContent").value.trim();

            if (!title || !content) {
                showToast("Please fill all fields", "warning");
                return;
            }

            const note = {
                title,
                content
            };

            try {
                let response;
                if (id) {
                    response = await fetch(`http://localhost:8081/notes/${id}`, {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        credentials: "include",
                        body: JSON.stringify(note)
                    });
                } else {
                    response = await fetch("http://localhost:8081/notes", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        credentials: "include",
                        body: JSON.stringify(note)
                    });
                }

                const result = await response.json();

                if (id && !result) {
                    showToast("Note not updated", "danger");
                } else {
                    showToast(id ? "Note updated" : "Note created", "success");
                }

                document.getElementById("editId").value = "";
                document.getElementById("noteTitle").value = "";
                document.getElementById("noteContent").value = "";

                loadNotes();
            } catch (error) {
                console.error("Error saving note:", error);
                showToast("Something went wrong", "danger");
            }
        }

        function editNote(id, title, content) {
            document.getElementById("editId").value = id;
            document.getElementById("noteTitle").value = title;
            document.getElementById("noteContent").value = content;
        }

        async function deleteNote(id) {
            await fetch(`http://localhost:8081/notes/${id}`, {
                method: "DELETE",
                credentials: "include"
            });
            showToast("Note deleted", "danger");
            loadNotes();
        }

        async function logout() {
            try {
                const response = await fetch("http://localhost:8081/users/logout", {
                    method: "POST",
                    credentials: "include"
                });

                if (response.ok) {
                    showToast("Logged out", "info");

                    setTimeout(() => {
                        window.location.replace("login.html");
                    }, 500);
                } else {
                    showToast("Logout failed", "danger");
                }
            } catch (error) {
                console.error("Logout error:", error);
                showToast("Something went wrong", "danger");
            }
        }

        checkSession();
        loadNotes();
    </script>

</body>

</html>
